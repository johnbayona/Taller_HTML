<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactorización con BEM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Catálogo de Cursos - TechNova Academy</h1>

    <!-- Tarjeta normal -->
    <section class="card">

        <img src="https://via.placeholder.com/300x180" alt="Curso HTML" class="card__image">

        <h2 class="card__title">
            Curso de HTML5
        </h2>

        <p class="card__text">
            Aprende a construir páginas web utilizando HTML5 desde cero con ejemplos prácticos.
        </p>

        <button class="card__button">
            Ver más
        </button>

    </section>

    <!-- Tarjeta destacada -->
    <section class="card card--featured">

        <img src="https://via.placeholder.com/300x180" alt="Curso CSS" class="card__image">

        <h2 class="card__title">
            Curso Completo de CSS3
        </h2>

        <p class="card__text">
            Domina Flexbox, Grid, animaciones, diseño responsive y buenas prácticas para crear interfaces modernas.
        </p>

        <button class="card__button card__button--primary">
            Inscribirse
        </button>

    </section>

</body>
</html>
